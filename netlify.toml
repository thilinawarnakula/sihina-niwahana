[build]
  publish = "client/dist"
  command = "cd client && npm install && npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/page"
  to = "/.netlify/functions/page"
  status = 200

[[redirects]]
  from = "/api/mail"
  to = "/.netlify/functions/mail"
  status = 200

# SPA fallback — React handles all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
